<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control: Earth vs. Aliens</title>
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/animations.css">
    <link rel="stylesheet" href="public/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <!-- Difficulty Screen -->
    <div id="difficultyScreen" class="diff-screen">
        <div class="diff-box">
            <h1>🚀 Mission Control</h1>
            <h2>Earth vs. Aliens</h2>
            <p class="diff-subtitle">Choose your difficulty</p>
            <div class="diff-buttons">
                <button class="diff-btn easy" onclick="startGame('easy')">🟢 Easy</button>
                <button class="diff-btn medium" onclick="startGame('medium')">🟡 Medium</button>
                <button class="diff-btn hard" onclick="startGame('hard')">🔴 Hard</button>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <header class="top-bar" id="topBar" style="display:none">
        <div class="hud-box">
            <h3>SCORE</h3>
            <p id="score">0</p>
        </div>
        <div class="title-box">
            <h1>🚀 Mission Control</h1>
            <div id="welcomeUser" class="welcome-user"></div>
        </div>
        <div class="hud-box">
            <h3>SHIELD</h3>
            <div class="health-bar-wrap">
                <div class="health-bar" id="healthBar"></div>
            </div>
            <p id="health">100%</p>
        </div>
    </header>

    <!-- Battle Scene -->
    <div class="battle-scene" id="battleScene" style="display:none">
        <div id="alienShipWrapper">
            <canvas id="alienCanvas" width="160" height="160"></canvas>
        </div>
        <div id="earthWrapper">
            <canvas id="earthCanvas" width="200" height="200"></canvas>
            <div id="explosionRing"></div>
        </div>
    </div>

    <div id="victoryParticles"></div>

    <!-- Question Box -->
    <div class="question-area" id="questionArea" style="display:none">
        <div class="question-box">
            <div class="question-header">
                <span class="question-number" id="questionNum">01 / 08</span>
                <div class="timer-wrap">
                    <div class="timer-bar" id="timerBar"></div>
                    <span class="timer-text" id="timerText">15</span>
                </div>
            </div>
            <h2 id="question">Loading...</h2>
            <div class="answers">
                <button class="answer-btn">A</button>
                <button class="answer-btn">B</button>
                <button class="answer-btn">C</button>
                <button class="answer-btn">D</button>
            </div>
        </div>
    </div>

    <script src="public/js/questions.js"></script>
    <script src="public/js/game.js"></script>
    <script src="public/js/ui.js"></script>
    <script src="public/js/shield.js"></script>
    <script src="public/js/laser.js"></script>
    <script src="public/js/3d.js"></script>
    <script src="public/js/main.js"></script>
</body>
</html>
